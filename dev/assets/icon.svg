<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3BA0FF"/>
      <stop offset="100%" style="stop-color:#1478D4"/>
    </linearGradient>
  </defs>

  <!-- 纯色背景，无圆角（系统自动裁剪） -->
  <rect width="80" height="80" fill="url(#bg)"/>

  <!-- 表格主体 -->
  <rect x="12" y="16" width="56" height="48" rx="5" fill="white" opacity="0.18"/>
  <rect x="12" y="16" width="56" height="14" rx="5" fill="white" opacity="0.3"/>
  <rect x="12" y="25" width="56" height="5" fill="white" opacity="0.3"/>

  <!-- 表格线条 -->
  <rect x="12" y="16" width="56" height="48" rx="5" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <line x1="12" y1="30" x2="68" y2="30" stroke="white" stroke-width="2" opacity="0.85"/>
  <line x1="12" y1="40" x2="68" y2="40" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="12" y1="50" x2="68" y2="50" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="28" y1="16" x2="28" y2="64" stroke="white" stroke-width="1.8" opacity="0.7"/>
  <line x1="46" y1="16" x2="46" y2="64" stroke="white" stroke-width="1.2" opacity="0.4"/>

  <!-- 表头文字模拟 -->
  <rect x="16" y="21" width="8" height="2" rx="1" fill="white" opacity="0.75"/>
  <rect x="32" y="21" width="10" height="2" rx="1" fill="white" opacity="0.75"/>
  <rect x="50" y="21" width="14" height="2" rx="1" fill="white" opacity="0.75"/>

  <!-- 数据行模拟 -->
  <rect x="16" y="34" width="6" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="32" y="34" width="8" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="16" y="44" width="6" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="32" y="44" width="10" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="16" y="54" width="6" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="32" y="54" width="7" height="1.5" rx="0.75" fill="white" opacity="0.45"/>

  <!-- 右上角金色宝石 -->
  <g transform="translate(60, 10)">
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#FFB900"/>
    <polygon points="0,-8 6,0 0,0 -6,0" fill="#FFD54F" opacity="0.6"/>
    <polygon points="0,-8 6,0 0,8 -6,0" fill="none" stroke="white" stroke-width="1"/>
  </g>

  <!-- 绿色勾号 -->
  <g transform="translate(52, 44)">
    <circle cx="0" cy="0" r="7" fill="#10B981"/>
    <polyline points="-3.5,0 -1,2.5 3.5,-2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
