<!DOCTYPE html>
<html><head>
<title>GameData Studio Writer</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
<p id="status">Initializing...</p>
<script>
var FILE_SERVER = 'http://localhost:9876';
var statusEl = document.getElementById('status');

async function handleMessage(msg) {
  try {
    if (msg.action === 'write') {
      statusEl.textContent = 'Writing: ' + msg.fileName;
      var resp = await fetch(FILE_SERVER + '/api/write-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ directory: msg.directory, fileName: msg.fileName, data: msg.data })
      });
      if (!resp.ok) {
        var text = await resp.text();
        return { id: msg.id, ok: false, error: 'HTTP ' + resp.status + ': ' + text };
      }
      return { id: msg.id, ok: true };

    } else if (msg.action === 'read') {
      var resp = await fetch(FILE_SERVER + '/api/read-file?directory=' + encodeURIComponent(msg.directory) + '&fileName=' + encodeURIComponent(msg.fileName));
      if (!resp.ok) {
        return { id: msg.id, ok: false, error: 'not found' };
      }
      var buf = await resp.arrayBuffer();
      var bytes = new Uint8Array(buf);
      var binary = '';
      for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return { id: msg.id, ok: true, data: btoa(binary) };

    } else if (msg.action === 'ping') {
      return { id: msg.id, ok: true };
    }
  } catch (err) {
    return { id: msg.id, ok: false, error: err.message };
  }
}

Office.onReady(function() {
  statusEl.textContent = 'Ready';
  Office.context.ui.addHandlerAsync(
    Office.EventType.DialogParentMessageReceived,
    async function(arg) {
      var msg = JSON.parse(arg.message);
      var result = await handleMessage(msg);
      Office.context.ui.messageParent(JSON.stringify(result));
    }
  );
  Office.context.ui.messageParent(JSON.stringify({ id: '__ready__', ok: true }));
});
</script>
</body></html>
